<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPQ Case Studies - Real-World Implementations</title>
    <link rel="stylesheet" href="shared.css">
    <script src="theme.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: var(--brand-primary, #6366f1);
            --secondary: var(--brand-secondary, #8b5cf6);
            --success: var(--color-success, #22c55e);
            --warning: var(--color-warning, #f59e0b);
            --danger: var(--color-danger, #ef4444);
            --light: var(--bg-body, #f8fafc);
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-primary, #333);
            background: var(--bg-body, #f8fafc);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--bg-card, white);
            border-radius: 12px;
            box-shadow: var(--shadow-lg, 0 10px 40px rgba(0,0,0,0.3));
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 50px 40px;
            text-align: center;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        .case-studies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin: 30px 0;
        }
        
        .case-study-card {
            background: var(--bg-card, white);
            border: 2px solid var(--border-light, #e2e8f0);
            border-radius: 8px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--shadow-card, 0 2px 8px rgba(0,0,0,0.1));
            color: var(--text-primary, #333);
        }
        
        .case-study-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-lg, 0 4px 16px rgba(0,0,0,0.15));
            transform: translateY(-5px);
        }
        
        .case-study-card p { color: var(--text-primary, #333); }
        
        .case-study-card h3 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .case-study-card .type {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            background: var(--color-info-bg, #e3f2fd);
            color: var(--primary);
            margin-bottom: 15px;
        }
        
        .case-study-card .roi {
            font-size: 1.4em;
            font-weight: bold;
            color: var(--success);
            margin-bottom: 10px;
        }
        
        .case-detail {
            display: none;
            margin-top: 30px;
            padding: 40px;
            background: var(--bg-card, white);
            border-radius: 8px;
            border: 2px solid var(--border-light, #e2e8f0);
            color: var(--text-primary, #333);
        }
        
        .case-detail.active {
            display: block;
        }
        
        .case-detail h2 {
            color: var(--primary);
            margin-bottom: 20px;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 15px;
            font-size: 2em;
        }
        
        .case-detail h3 {
            color: var(--secondary);
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        
        .metric-box {
            background: var(--color-info-bg, #f5f5f5);
            border-left: 4px solid var(--primary);
            padding: 20px;
            border-radius: 4px;
            color: var(--text-primary, #333);
        }
        
        .metric-box strong {
            color: var(--primary);
            display: block;
            margin-bottom: 10px;
            font-size: 0.95em;
        }
        
        .metric-value {
            font-size: 1.8em;
            font-weight: bold;
            color: var(--success);
        }
        
        .challenge-box {
            background: var(--color-danger-bg, #ffebee);
            border-left: 4px solid var(--danger);
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
            color: var(--text-primary, #333);
        }
        
        .solution-box {
            background: var(--color-success-bg, #e8f5e9);
            border-left: 4px solid var(--success);
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
            color: var(--text-primary, #333);
        }
        
        .results-box {
            background: var(--color-info-bg, #e3f2fd);
            border-left: 4px solid var(--primary);
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
            color: var(--text-primary, #333);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: var(--bg-card, white);
        }
        
        table th {
            background: var(--primary);
            color: white;
            padding: 15px;
            text-align: left;
        }
        
        table td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--light);
        }
        
        table tr:hover {
            background: var(--light);
        }
        
        .close-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 30px;
            font-size: 1em;
        }
        
        .close-btn:hover {
            background: #d32f2f;
        }
        
        .roi-banner {
            background: linear-gradient(135deg, var(--success) 0%, #45a049 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
        }
        
        footer {
            background: var(--light);
            padding: 30px;
            text-align: center;
            color: #666;
            border-top: 2px solid var(--primary);
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }
            
            .content {
                padding: 20px;
            }
            
            .case-studies-grid {
                grid-template-columns: 1fr;
            }
            
            .case-detail {
                padding: 20px;
            }
            
            .metrics-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 CPQ Case Studies</h1>
            <p>Real-World Implementations with Proven Results</p>
        </header>
        
        <div class="content">
            <h2 style="color: var(--primary); margin-bottom: 30px; border-bottom: 3px solid var(--primary); padding-bottom: 15px;">4 Detailed Case Studies</h2>
            
            <div class="case-studies-grid" id="caseStudiesGrid">
                <!-- Cases will be populated here -->
            </div>
            
            <div id="caseDetails"></div>
        </div>
        
        <footer>
            <p><strong>CPQ Case Studies - Real World Results</strong></p>
            <p>4 Complete case studies | SaaS, Enterprise, Usage-based, Global implementations</p>
            <p>Combined Year 1 ROI: $70.6M</p>
        </footer>
    </div>
    
    <script>
        const caseStudies = [
            {
                id: 1,
                name: "CloudData Analytics",
                type: "SaaS Company",
                roi: "$7.9M",
                challenge: "Manual quote process taking 2-3 days, 30% of quotes had pricing errors, inconsistent discounting",
                solution: "Implemented CPQ with per-user pricing model, volume discounts, feature tier bundles, and automated approval workflows",
                results: {
                    quoteTime: { before: "2-3 days", after: "5 minutes", improvement: "97% faster" },
                    accuracy: { before: "70%", after: "99.9%", improvement: "Error elimination" },
                    salesCycle: { before: "90 days", after: "60 days", improvement: "33% shorter" },
                    dealSize: { before: "$15K", after: "$18.5K", improvement: "+23%" },
                    winRate: { before: "40%", after: "55%", improvement: "+37%" }
                },
                metrics: [
                    { label: "Quote Generation", value: "97% faster" },
                    { label: "Pricing Accuracy", value: "99.9%" },
                    { label: "Sales Cycle", value: "33% shorter" },
                    { label: "Deal Size", value: "+23%" },
                    { label: "Win Rate", value: "+37%" },
                    { label: "Year 1 ROI", value: "$7.9M" }
                ]
            },
            {
                id: 2,
                name: "EnterpriseFlow Corp",
                type: "Enterprise Software",
                roi: "$24.5M",
                challenge: "50+ product modules, complex dependencies, 10-14 day approval cycles, professional services pricing inconsistency",
                solution: "Advanced CPQ with product dependencies, multi-tier approval matrix, CRM integration, and services pricing module",
                results: {
                    complexity: { before: "Manual", after: "Automated", improvement: "100% automated" },
                    approvals: { before: "2 weeks", after: "4 hours", improvement: "99.7% faster" },
                    reps: { before: "60% admin", after: "15% admin", improvement: "75% more selling" },
                    margin: { before: "55%", after: "62%", improvement: "+7 points" },
                    dealSize: { before: "$800K", after: "$950K", improvement: "+19%" }
                },
                metrics: [
                    { label: "Quote Time", value: "95% faster" },
                    { label: "Approval Time", value: "99.7% faster" },
                    { label: "Selling Time", value: "+75%" },
                    { label: "Margin", value: "+7%" },
                    { label: "Deal Size", value: "+19%" },
                    { label: "Year 1 ROI", value: "$24.5M" }
                ]
            },
            {
                id: 3,
                name: "CloudOps Services",
                type: "Usage-Based Pricing",
                roi: "$3.2M",
                challenge: "Dynamic usage-based pricing complexity, variable monthly usage (5-50%), manual renewal quotes",
                solution: "Real-time pricing integration with usage tracking, automated renewal quote generation with trend analysis",
                results: {
                    quoteTime: { before: "4-6 hours", after: "5 minutes", improvement: "98% faster" },
                    renewals: { before: "2 weeks", after: "2 days", improvement: "86% faster" },
                    winRate: { before: "75%", after: "92%", improvement: "+23%" },
                    retention: { before: "88%", after: "96%", improvement: "+9%" },
                    upsell: { before: "30%", after: "55%", improvement: "+83%" }
                },
                metrics: [
                    { label: "Quote Time", value: "98% faster" },
                    { label: "Renewal Time", value: "86% faster" },
                    { label: "Win Rate", value: "+23%" },
                    { label: "Retention", value: "+9%" },
                    { label: "Upsell", value: "+83%" },
                    { label: "Year 1 ROI", value: "$3.2M" }
                ]
            },
            {
                id: 4,
                name: "GlobalSoft Inc",
                type: "Global Enterprise",
                roi: "$35M",
                challenge: "50+ countries, 15+ currencies, regional pricing variations (30%), compliance by jurisdiction, channel partners",
                solution: "Multi-currency CPQ with regional pricing rules, dynamic exchange rates, compliance enforcement, partner portal",
                results: {
                    consistency: { before: "Variable", after: "Consistent", improvement: "+40% efficiency" },
                    compliance: { before: "8/month violations", after: "0/month", improvement: "100% compliance" },
                    errors: { before: "2% deals", after: "0.01%", improvement: "99% reduction" },
                    partners: { before: "Manual quotes", after: "Self-service", improvement: "Automated" },
                    sales: { before: "Baseline", after: "Baseline", improvement: "+40%" }
                },
                metrics: [
                    { label: "Multi-region Time", value: "95% faster" },
                    { label: "Compliance", value: "100%" },
                    { label: "Tax Errors", value: "-99%" },
                    { label: "Partner Adoption", value: "+183%" },
                    { label: "Partner Revenue", value: "+125%" },
                    { label: "Year 1 ROI", value: "$35M" }
                ]
            }
        ];
        
        function populateCases() {
            const grid = document.getElementById('caseStudiesGrid');
            
            caseStudies.forEach(caseStudy => {
                const card = document.createElement('div');
                card.className = 'case-study-card';
                card.onclick = () => showDetail(caseStudy.id);
                
                card.innerHTML = `
                    <h3>${caseStudy.name}</h3>
                    <span class="type">${caseStudy.type}</span>
                    <div class="roi">Year 1 ROI: ${caseStudy.roi}</div>
                    <p><strong>Challenge:</strong> ${caseStudy.challenge.substring(0, 80)}...</p>
                `;
                
                grid.appendChild(card);
            });
        }
        
        function showDetail(id) {
            const caseStudy = caseStudies.find(c => c.id === id);
            const detailDiv = document.getElementById('caseDetails');
            
            const metricsHTML = caseStudy.metrics.map(m => `
                <div class="metric-box">
                    <strong>${m.label}</strong>
                    <div class="metric-value">${m.value}</div>
                </div>
            `).join('');
            
            detailDiv.innerHTML = `
                <div class="case-detail active">
                    <h2>${caseStudy.name}</h2>
                    <div class="roi-banner">Year 1 ROI: ${caseStudy.roi}</div>
                    
                    <h3>Company Profile</h3>
                    <p><strong>Type:</strong> ${caseStudy.type}</p>
                    
                    <h3>Challenge</h3>
                    <div class="challenge-box">
                        <p>${caseStudy.challenge}</p>
                    </div>
                    
                    <h3>Solution</h3>
                    <div class="solution-box">
                        <p>${caseStudy.solution}</p>
                    </div>
                    
                    <h3>Key Results</h3>
                    <div class="metrics-grid">
                        ${metricsHTML}
                    </div>
                    
                    <h3>Detailed Results</h3>
                    <div class="results-box">
                        <table>
                            <tr>
                                <th>Metric</th>
                                <th>Before</th>
                                <th>After</th>
                                <th>Improvement</th>
                            </tr>
                            ${Object.entries(caseStudy.results).map(([key, value]) => `
                                <tr>
                                    <td><strong>${key.replace(/([A-Z])/g, ' $1')}</strong></td>
                                    <td>${value.before}</td>
                                    <td>${value.after}</td>
                                    <td>${value.improvement}</td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>
                    
                    <button class="close-btn" onclick="closeDetail()">← Back to Case Studies</button>
                </div>
            `;
            
            // Scroll to the detail section so user can see it
            detailDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        function closeDetail() {
            document.getElementById('caseDetails').innerHTML = '';
        }
        
        // Initial load
        populateCases();
    </script>
    <script src="progress.js"></script>
    <script src="search.js"></script>
    <script src="nav.js"></script>
    <script src="chatbot.js"></script>
</body>
</html>
